<svg xmlns="http://www.w3.org/2000/svg" width="220" height="180" viewBox="0 0 220 180" fill="none">

  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF6D5"></stop>
      <stop offset="20%" stop-color="#F6D878"></stop>
      <stop offset="50%" stop-color="#D4AF37"></stop>
      <stop offset="80%" stop-color="#B8860B"></stop>
      <stop offset="100%" stop-color="#FFF1B8"></stop>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#B8860B" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs>

  <!-- Left Ring -->
  <circle cx="82" cy="95" r="42" stroke="url(#goldGradient)" stroke-width="8" fill="none" filter="url(#shadow)"></circle>

  <!-- Right Ring -->
  <circle cx="132" cy="95" r="42" stroke="url(#goldGradient)" stroke-width="8" fill="none" filter="url(#shadow)"></circle>

  <!-- Diamond -->
  <g transform="translate(132 45)">
      <polygon points="0,-10 8,0 0,10 -8,0" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"></polygon>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#DADADA" stroke-width="0.8"></line>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#DADADA" stroke-width="0.8"></line>
  </g>

  <!-- Sparkles -->
  <g stroke="#F4D03F" stroke-width="2" stroke-linecap="round">
      <line x1="165" y1="38" x2="165" y2="48"></line>
      <line x1="160" y1="43" x2="170" y2="43"></line>

      <line x1="48" y1="58" x2="48" y2="66"></line>
      <line x1="44" y1="62" x2="52" y2="62"></line>

      <line x1="175" y1="120" x2="175" y2="128"></line>
      <line x1="171" y1="124" x2="179" y2="124"></line>
  </g>

</svg>